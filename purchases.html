<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Закупки — Keep1R CRM</title>
<link rel="stylesheet" href="nav.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="mobile.css?v=1774508385">
<style>
:root {
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
  --bg: #f5f3ff; --surface: #ffffff;
  --border: rgba(124,58,237,0.10); --text: #1e1b4b;
  --muted: #64748b; --dim: #94a3b8;
  --primary: #7c3aed; --primary-dark: #6d28d9;
  --success: #059669; --danger: #ef4444; --warning: #d97706;
  --radius: 14px; --radius-sm: 9px;
  --shadow: 0 1px 3px rgba(124,58,237,0.06), 0 4px 16px rgba(124,58,237,0.04);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); -webkit-font-smoothing: antialiased; background: var(--bg); color: var(--text); }

.container { max-width: 1280px; margin: 0 auto; padding: 24px; }
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.page-header h1 { font-size: 1.4rem; font-weight: 800; }

/* ── Фильтры ───────────────────────── */
.filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.filters input, .filters select {
  padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 0.85rem; outline: none; background: var(--surface); font-family: var(--font); color: var(--text);
}
.filters input:focus, .filters select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(124,58,237,0.08); }

/* ── Сводка ────────────────────────── */
.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
.summary-card { background: var(--surface); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); }
.summary-label { font-size: 0.69rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.summary-value { font-size: 1.3rem; font-weight: 800; color: var(--primary); }
.summary-value.green { color: var(--success); }

/* ── Таблица ───────────────────────── */
.table-wrap { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; }
.table-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.table-title { font-size: 0.92rem; font-weight: 700; }
.table-count { font-size: 0.72rem; color: var(--dim); font-weight: 600; }
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th { padding: 10px 16px; text-align: left; font-size: 0.69rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); background: rgba(124,58,237,0.02); white-space: nowrap; }
td { padding: 11px 16px; font-size: 0.85rem; color: var(--text); border-bottom: 1px solid rgba(124,58,237,0.04); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(124,58,237,0.02); }
.td-amount { font-weight: 700; color: var(--success); white-space: nowrap; }
.td-date { white-space: nowrap; color: var(--muted); font-size: 0.82rem; }
.td-supplier { font-weight: 600; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.68rem; font-weight: 700; }
.badge-cash { background: rgba(5,150,105,0.08); color: var(--success); }
.badge-card { background: rgba(124,58,237,0.08); color: var(--primary); }
.badge-transfer { background: rgba(99,102,241,0.08); color: #4338ca; }

.empty { text-align: center; padding: 60px 20px; color: var(--dim); }
.empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

.btn-new {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 18px; border-radius: var(--radius-sm);
  background: var(--primary); color: #fff; border: none;
  font-size: 0.83rem; font-weight: 700; font-family: var(--font);
  cursor: pointer; transition: background .15s; white-space: nowrap;
}
.btn-new:hover { background: var(--primary-dark); }

@media (max-width: 640px) {
  .container { padding: 14px 12px 32px; }
  .page-header h1 { font-size: 1.1rem; }
  .summary-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .summary-card { padding: 12px; }
  .summary-value { font-size: 1.1rem; }
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { min-width: 600px; }
  th, td { padding: 8px 10px; font-size: 0.78rem; white-space: nowrap; }
  .filters input { width: 120px; }
}
</style>
</head>
<body style="visibility:hidden">

<div class="container">
  <div class="page-header">
    <h1>Закупки</h1>
    <button class="btn-new" onclick="window.location.href='inventory.html'" title="Новая закупка оформляется через склад">+ Новая закупка</button>
  </div>

  <div class="filters">
    <input type="date" id="fDateFrom" title="Дата от">
    <input type="date" id="fDateTo" title="Дата до">
    <input type="text" id="fSupplier" placeholder="Поставщик..." style="min-width:160px">
  </div>

  <div class="summary-grid" id="summaryGrid">
    <div class="summary-card"><div class="summary-label">Закупок за период</div><div class="summary-value" id="sumCount">—</div></div>
    <div class="summary-card"><div class="summary-label">Сумма закупок</div><div class="summary-value green" id="sumTotal">—</div></div>
    <div class="summary-card"><div class="summary-label">Товары</div><div class="summary-value" id="sumGoods">—</div></div>
    <div class="summary-card"><div class="summary-label">Доставка + прочее</div><div class="summary-value" id="sumOther">—</div></div>
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <span class="table-title">История закупок</span>
      <span class="table-count" id="tableCount"></span>
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Дата</th>
            <th>Поставщик</th>
            <th>Счёт</th>
            <th>Оплата</th>
            <th style="text-align:right">Сумма</th>
            <th>Примечание</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="6" class="empty"><div class="empty-icon">📦</div>Загрузка...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="nav.js?v=1774551573"></script>
<script src="footer.js?v=1774512457"></script>
<script type="module">
import { sb } from './api.js';
import { requireAuth } from './auth.js';
import { getStudioContext } from './studio-context.js';
import { escapeHtml } from './formatters.js';

const PAYMENT_LABELS = {
  cash: 'Наличные', card: 'Карта', transfer: 'Безнал', mixed: 'Смешанная',
};
const PAYMENT_CLS = {
  cash: 'badge-cash', card: 'badge-card', transfer: 'badge-transfer',
};

function fmt(n) {
  return new Intl.NumberFormat('ru-RU', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(n || 0);
}
function fmtDate(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString('ru-RU'); } catch { return d; }
}

let allPurchases = [];
let studioCtx = null;

async function loadPurchases() {
  const { data, error } = await sb
    .from('purchases')
    .select('id, purchase_date, supplier_name, invoice_number, payment_method, total_amount, total_goods, total_delivery, total_other, notes, created_at')
    .eq('studio_id', studioCtx.studioId)
    .order('purchase_date', { ascending: false });

  if (error) {
    console.error('[purchases] load:', error);
    document.getElementById('tableBody').innerHTML =
      '<tr><td colspan="6" class="empty"><div class="empty-icon">⚠️</div>Ошибка загрузки</td></tr>';
    return;
  }
  allPurchases = data || [];
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  const search = (document.getElementById('fSupplier').value || '').trim().toLowerCase();
  const dateFrom = document.getElementById('fDateFrom').value;
  const dateTo = document.getElementById('fDateTo').value;

  let filtered = allPurchases;

  if (search) {
    filtered = filtered.filter(p => (p.supplier_name || '').toLowerCase().includes(search));
  }
  if (dateFrom) {
    filtered = filtered.filter(p => (p.purchase_date || p.created_at || '').slice(0, 10) >= dateFrom);
  }
  if (dateTo) {
    filtered = filtered.filter(p => (p.purchase_date || p.created_at || '').slice(0, 10) <= dateTo);
  }

  // Сводка
  const totalAmount = filtered.reduce((s, p) => s + Number(p.total_amount || 0), 0);
  const totalGoods = filtered.reduce((s, p) => s + Number(p.total_goods || 0), 0);
  const totalOther = filtered.reduce((s, p) => s + Number(p.total_delivery || 0) + Number(p.total_other || 0), 0);
  document.getElementById('sumCount').textContent = String(filtered.length);
  document.getElementById('sumTotal').textContent = fmt(totalAmount) + ' ₽';
  document.getElementById('sumGoods').textContent = fmt(totalGoods) + ' ₽';
  document.getElementById('sumOther').textContent = fmt(totalOther) + ' ₽';
  document.getElementById('tableCount').textContent = filtered.length ? filtered.length + ' записей' : '';

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty"><div class="empty-icon">📦</div>Закупок не найдено</td></tr>';
    return;
  }

  tbody.innerHTML = '';
  const e = escapeHtml;
  filtered.forEach(p => {
    const tr = document.createElement('tr');
    const paymentCls = PAYMENT_CLS[p.payment_method] || 'badge-cash';
    const paymentLabel = PAYMENT_LABELS[p.payment_method] || p.payment_method || '—';

    tr.innerHTML =
      '<td class="td-date">' + e(fmtDate(p.purchase_date || p.created_at)) + '</td>' +
      '<td class="td-supplier">' + e(p.supplier_name || '—') + '</td>' +
      '<td>' + e(p.invoice_number || '—') + '</td>' +
      '<td><span class="badge ' + paymentCls + '">' + e(paymentLabel) + '</span></td>' +
      '<td class="td-amount" style="text-align:right">' + fmt(p.total_amount) + ' ₽</td>' +
      '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);font-size:0.8rem">' + e(p.notes || '') + '</td>';
    tbody.appendChild(tr);
  });
}

async function initPage() {
  initNav();
  const user = await requireAuth({ redirectTo: 'welcome.html' });
  if (!user) return;

  studioCtx = await getStudioContext();
  if (!studioCtx?.studioId) { window.location.href = 'welcome.html'; return; }
  if (!studioCtx.hasAccess) { document.body.style.visibility = 'visible'; return; }

  document.body.style.visibility = 'visible';

  document.getElementById('fSupplier').addEventListener('input', renderTable);
  document.getElementById('fDateFrom').addEventListener('change', renderTable);
  document.getElementById('fDateTo').addEventListener('change', renderTable);

  await loadPurchases();
}

initPage();
</script>
</body>
</html>
