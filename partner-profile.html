<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Профиль — Keep1R Partner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<style>
:root { --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; --bg: #f5f3ff; --surface: #fff; --border: rgba(124,58,237,0.10); --text: #1e1b4b; --muted: #64748b; --primary: #7c3aed; --success: #059669; --radius: 14px; --shadow: 0 1px 3px rgba(124,58,237,0.06), 0 4px 16px rgba(124,58,237,0.04); }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); -webkit-font-smoothing: antialiased; background: var(--bg); color: var(--text); }
.container { max-width: 820px; margin: 0 auto; padding: 24px; }
h1 { font-size: 1.3rem; font-weight: 800; margin-bottom: 24px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; box-shadow: var(--shadow); }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 6px; }
.form-group input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 0.88rem; font-family: inherit; color: var(--text); outline: none; }
.form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(124,58,237,0.08); }
.form-group input:disabled { background: #f8fafc; color: var(--muted); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.btn { padding: 10px 20px; border-radius: 10px; border: none; font-size: 0.88rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.15s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: #6d28d9; }
.btn-danger { background: rgba(239,68,68,0.08); color: #ef4444; border: 1px solid rgba(239,68,68,0.15); }
.btn-danger:hover { background: #ef4444; color: #fff; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 10px; font-size: 0.82rem; font-weight: 600; color: #fff; z-index: 9999; animation: fadein 0.2s ease; }
@keyframes fadein { from { opacity:0; transform: translate(-50%, 10px); } to { opacity:1; transform: translate(-50%, 0); } }
@media (max-width: 640px) { .container { padding: 14px 12px 32px; } .form-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<script src="partner-nav.js"></script>
<div class="container">
  <h1>👤 Профиль</h1>
  <div class="card">
    <div class="form-group">
      <label>Название студии</label>
      <input type="text" id="fCompany" placeholder="ООО Авто Класс">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Контактное лицо</label>
        <input type="text" id="fContact" placeholder="Иванов Иван">
      </div>
      <div class="form-group">
        <label>Телефон</label>
        <input type="text" id="fPhone" placeholder="+7 999 000 00 00">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="fEmail" disabled>
      </div>
      <div class="form-group">
        <label>Город</label>
        <input type="text" id="fCity" placeholder="Москва">
      </div>
    </div>
    <button class="btn btn-primary" id="btnSave">Сохранить</button>
  </div>

  <div class="card">
    <button class="btn btn-danger" onclick="if(confirm('Выйти из аккаунта?')){localStorage.removeItem('k1r_token');localStorage.removeItem('k1r_user');location.href='partner-login.html'}">🚪 Выйти из аккаунта</button>
  </div>
</div>
<script type="module">
import { partnerFetch, requirePartnerAuth } from './partner-api.js';
if (!requirePartnerAuth()) throw 'no auth';

function toast(text, color) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = text; t.style.background = color || '#059669';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

async function init() {
  const { data, error } = await partnerFetch('/partner/me');
  if (error) { toast('Ошибка загрузки', '#ef4444'); return; }

  const c = data.client || {};
  document.getElementById('fCompany').value = c.company_name || '';
  document.getElementById('fContact').value = c.contact_name || '';
  document.getElementById('fPhone').value = c.phone || '';
  document.getElementById('fEmail').value = c.email || '';
  document.getElementById('fCity').value = c.city || '';
}

document.getElementById('btnSave').addEventListener('click', async () => {
  const btn = document.getElementById('btnSave');
  btn.disabled = true; btn.textContent = '⏳';

  const { error } = await partnerFetch('/partner/profile', 'POST', {
    company_name: document.getElementById('fCompany').value.trim(),
    contact_name: document.getElementById('fContact').value.trim(),
    phone: document.getElementById('fPhone').value.trim(),
    city: document.getElementById('fCity').value.trim(),
  });

  btn.disabled = false; btn.textContent = 'Сохранить';
  if (error) { toast('Ошибка: ' + error, '#ef4444'); return; }
  toast('✅ Сохранено');
});

init();
</script>
</body>
</html>
