<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сотрудники — Keep1R CRM</title>
<link rel="stylesheet" href="nav.css">
<script src="nav.js"></script>
<style>
:root {
  --font:       -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
  --bg:         #eef2f9; --surface: #ffffff;
  --border:     rgba(15,23,42,0.08); --text: #0f172a;
  --text-muted: #64748b; --text-dim: #94a3b8;
  --primary:    #2563eb; --primary-dk: #1d4ed8;
  --success:    #059669; --danger: #dc2626;
  --radius: 14px; --radius-sm: 9px;
  --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 14px rgba(0,0,0,0.06);
  --shadow-modal: 0 8px 40px rgba(0,0,0,0.14);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); -webkit-font-smoothing: antialiased; background: var(--bg); color: var(--text); min-height: 100svh; }

.container { max-width: 1280px; margin: 0 auto; padding: 24px 20px 48px; }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
.card-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--border); gap: 14px; flex-wrap: wrap; }
.card-title  { font-size: 0.95rem; font-weight: 700; letter-spacing: -0.1px; }
.card-actions-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

.checkbox-label { display: inline-flex; align-items: center; gap: 7px; cursor: pointer; font-size: 0.82rem; font-weight: 600; color: var(--text-muted); user-select: none; }
.checkbox-label input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--primary); }
.checkbox-label:hover { color: var(--text); }

.executors-table { width: 100%; border-collapse: collapse; }
.executors-table thead { background: var(--bg); border-bottom: 1px solid var(--border); }
.executors-table th { padding: 11px 16px; text-align: left; font-size: 0.67rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); white-space: nowrap; }
.executors-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
.executors-table tbody tr:last-child { border-bottom: none; }
.executors-table tbody tr:hover { background: #f8fafc; }
.executors-table td { padding: 14px 16px; font-size: 0.85rem; vertical-align: middle; }
.executor-name  { font-weight: 700; font-size: 0.9rem; color: var(--text); }
.executor-role  { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 0.73rem; font-weight: 700; background: var(--bg); border: 1px solid var(--border); color: var(--text-muted); }
.executor-phone { color: var(--text-muted); font-size: 0.82rem; }
.row-actions    { display: flex; gap: 6px; align-items: center; }

.badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.04em; }
.badge-success  { background: rgba(5,150,105,0.10); color: var(--success); border: 1px solid rgba(5,150,105,0.2); }
.badge-inactive { background: var(--bg); color: var(--text-dim); border: 1px solid var(--border); }

.btn { display: inline-flex; align-items: center; gap: 5px; padding: 8px 16px; border-radius: var(--radius-sm); font-size: 0.81rem; font-weight: 700; font-family: var(--font); cursor: pointer; border: none; transition: all 0.15s; text-decoration: none; white-space: nowrap; }
.btn-primary   { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dk); }
.btn-success   { background: var(--success); color: #fff; }
.btn-success:hover { background: #047857; }
.btn-secondary { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg); color: var(--text); }
.btn-danger    { background: rgba(220,38,38,0.07); color: var(--danger); border: 1px solid rgba(220,38,38,0.15); }
.btn-danger:hover { background: var(--danger); color: #fff; border-color: var(--danger); }
.btn-icon { padding: 7px 10px; font-size: 0.85rem; }
.btn[disabled] { opacity: 0.5; cursor: not-allowed; }

.btn-add { background: var(--primary); color: #fff; border: none; padding: 8px 16px; border-radius: var(--radius-sm); font-size: 0.81rem; font-weight: 700; font-family: var(--font); cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 5px; }
.btn-add:hover { background: var(--primary-dk); }

.loading     { text-align: center; padding: 52px 20px; color: var(--text-muted); font-size: 0.88rem; }
.empty-state { text-align: center; padding: 56px 20px; color: var(--text-muted); }
.empty-state-icon { font-size: 2.5rem; margin-bottom: 10px; opacity: 0.3; }
.empty-state h3   { font-size: 0.95rem; font-weight: 700; color: var(--text); }
.empty-state p    { font-size: 0.82rem; margin-top: 4px; }

.modal { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.5); backdrop-filter: blur(6px); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
.modal.active { display: flex; animation: fadeIn 0.15s ease; }
@keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.modal-content { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 26px 28px 24px; max-width: 460px; width: 100%; max-height: 90svh; overflow-y: auto; box-shadow: var(--shadow-modal); animation: slideUp 0.18s ease; }
.modal-header  { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-header h3 { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.2px; }
.modal-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--text-dim); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 7px; transition: all 0.15s; line-height: 1; }
.modal-close:hover { background: var(--bg); color: var(--text); }

.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 0.69rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 5px; }
.form-group input, .form-group select { width: 100%; padding: 10px 13px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 16px; font-family: var(--font); transition: border-color 0.15s, box-shadow 0.15s; outline: none; -webkit-appearance: none; }
.form-group input:focus, .form-group select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.10); background: var(--surface); }
.form-group small { display: block; margin-top: 4px; color: var(--text-dim); font-size: 0.72rem; }

.checkbox-group { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--bg); border-radius: var(--radius-sm); border: 1px solid var(--border); cursor: pointer; }
.checkbox-group input[type="checkbox"] { width: 17px; height: 17px; cursor: pointer; accent-color: var(--success); flex-shrink: 0; }
.checkbox-group label { font-size: 0.83rem; font-weight: 600; cursor: pointer; color: var(--text); text-transform: none; letter-spacing: 0; margin: 0; }

.modal-footer { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }

@media (max-width: 768px) {
  .container { padding: 16px 14px 40px; }
  .executors-table thead { display: none; }
  .executors-table, .executors-table tbody { display: block; }
  .executors-table tr { display: block; margin: 0; border-bottom: 1px solid var(--border); padding: 14px 16px; }
  .executors-table tr:last-child { border-bottom: none; }
  .executors-table td { display: inline-block; padding: 0; border: none; font-size: 0.82rem; }
  .executors-table td[data-label="ФИО"]      { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .executors-table td[data-label="Роль"]     { margin-right: 8px; }
  .executors-table td[data-label="Телефон"]  { display: block; color: var(--text-muted); font-size: 0.78rem; margin-bottom: 6px; }
  .executors-table td[data-label="Статус"]   { display: inline-block; margin-bottom: 10px; }
  .executors-table td[data-label="Действия"] { display: flex; gap: 6px; }
  .modal-content { padding: 22px 18px 20px; }
  .modal-footer  { flex-direction: column-reverse; gap: 7px; }
  .modal-footer .btn { width: 100%; justify-content: center; }
}
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <div class="card-header">
      <span class="card-title">👥 Список сотрудников</span>
      <div class="card-actions-row">
        <label class="checkbox-label">
          <input type="checkbox" id="showInactive">
          <span>Показать неактивных</span>
        </label>
        <button class="btn-add" id="btnAddExecutor">➕ Добавить</button>
      </div>
    </div>
    <div id="executorsContainer">
      <div class="loading">⏳ Загрузка...</div>
    </div>
  </div>
</div>

<!-- Модал -->
<div class="modal" id="executorModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitle">Добавить сотрудника</h3>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <input type="hidden" id="executorId">
    <div class="form-group">
      <label for="executorName">ФИО *</label>
      <input type="text" id="executorName" placeholder="Иванов Иван Иванович" autocomplete="name">
    </div>
    <div class="form-group">
      <label for="executorRole">Роль *</label>
      <select id="executorRole">
        <option value="">Выберите роль</option>
        <option value="wrapper">Оклейщик</option>
        <option value="preparer">Подготовщик</option>
        <option value="armature">Арматурщик</option>
        <option value="detailer">Детейлер</option>
        <option value="universal">Универсал</option>
      </select>
    </div>
    <div class="form-group">
      <label for="executorPhone">Телефон</label>
      <input type="tel" id="executorPhone" placeholder="+7 (999) 123-45-67" autocomplete="tel">
      <small>Необязательно</small>
    </div>
    <div class="checkbox-group">
      <input type="checkbox" id="executorIsAdmin">
      <label for="executorIsAdmin">✅ Может продавать (получает % от чека)</label>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" id="btnCancel">Отмена</button>
      <button type="button" class="btn btn-success"   id="btnSave">💾 Сохранить</button>
    </div>
  </div>
</div>

<!-- Карточка сотрудника (drawer) -->
<div id="execCardOverlay" style="display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:900;backdrop-filter:blur(4px)" onclick="closeExecutorCard()"></div>
<div id="execCardDrawer" style="
  display:none;position:fixed;top:0;right:0;bottom:0;width:460px;max-width:100vw;
  background:#fff;box-shadow:-8px 0 40px rgba(0,0,0,.15);z-index:901;
  overflow-y:auto;flex-direction:column;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:20px 22px 16px;border-bottom:1px solid #e2e8f0;position:sticky;top:0;background:#fff;z-index:1">
    <div>
      <div id="execCardName" style="font-size:1.1rem;font-weight:800;color:#0f172a"></div>
      <div id="execCardRole" style="font-size:0.75rem;color:#64748b;margin-top:2px"></div>
    </div>
    <button onclick="closeExecutorCard()" style="background:rgba(100,116,139,.1);border:none;cursor:pointer;width:32px;height:32px;border-radius:50%;font-size:1.1rem;display:flex;align-items:center;justify-content:center;color:#64748b;transition:all .15s" onmouseover="this.style.background='rgba(220,38,38,.1)';this.style.color='#dc2626'" onmouseout="this.style.background='rgba(100,116,139,.1)';this.style.color='#64748b'">✕</button>
  </div>
  <div id="execCardBody" style="padding:20px 22px;flex:1"></div>
</div>

<style>
#execCardDrawer.open { display:flex!important; animation:execSlide .2s ease; }
@keyframes execSlide { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
.exec-section { margin-bottom:20px; }
.exec-section-title { font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:#94a3b8;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #f1f5f9 }
.exec-kpi-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px }
.exec-kpi { background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:12px 14px;text-align:center }
.exec-kpi-val { font-size:1.1rem;font-weight:800;color:#0f172a;line-height:1 }
.exec-kpi-lbl { font-size:.65rem;color:#94a3b8;font-weight:700;text-transform:uppercase;margin-top:4px }
.exec-assign-row { display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:.82rem }
.exec-assign-row:last-child { border-bottom:none }
.exec-eq-row { display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:.82rem }
.exec-eq-row:last-child { border-bottom:none }
.exec-pill-paid { background:rgba(5,150,105,.1);color:#059669;font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:20px }
.exec-pill-pending { background:rgba(245,158,11,.1);color:#b45309;font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:20px }
.exec-empty { color:#94a3b8;font-size:.82rem;text-align:center;padding:20px 0 }
</style>

<script src="footer.js"></script>
<script type="module">
import { sb }             from './api.js';
import { requireAuth }     from './auth.js';
import { getStudioContext } from './studio-context.js';
import { confirmAction }   from './ui.js';

// ── Состояние ─────────────────────────────────────────────────────────
let studioId          = null;
let currentUser       = null;
let editingExecutorId = null;

const roleNames = {
  wrapper:   'Оклейщик',
  preparer:  'Подготовщик',
  armature:  'Арматурщик',
  detailer:  'Детейлер',
  universal: 'Универсал',
};

// ── Загрузка ──────────────────────────────────────────────────────────
async function loadExecutors() {
  const container    = document.getElementById('executorsContainer');
  const showInactive = document.getElementById('showInactive').checked;

  container.innerHTML = '<div class="loading">⏳ Загрузка...</div>';

  let query = sb.from('executors').select('*')
    .eq('studio_id', studioId)
    .order('full_name', { ascending: true });
  if (!showInactive) query = query.eq('is_active', true);

  const { data, error } = await query;

  if (error) {
    console.error('[executors] loadExecutors:', error);
    container.innerHTML = '';
    const msg = document.createElement('div');
    msg.className = 'empty-state';
    msg.textContent = '❌ Ошибка загрузки. Проверьте консоль.';
    container.appendChild(msg);
    return;
  }

  if (!data || data.length === 0) {
    container.innerHTML = '';
    const es = document.createElement('div');
    es.className = 'empty-state';
    es.innerHTML = '<div class="empty-state-icon">👥</div>';
    const h = document.createElement('h3');
    h.textContent = 'Нет сотрудников';
    const p = document.createElement('p');
    p.textContent = 'Добавьте первого исполнителя';
    es.append(h, p);
    container.appendChild(es);
    return;
  }

  renderTable(data);
}

// ── Рендер таблицы ────────────────────────────────────────────────────
function renderTable(executors) {
  const container = document.getElementById('executorsContainer');
  container.innerHTML = '';

  const tbl  = document.createElement('table');
  tbl.className = 'executors-table';

  // thead
  tbl.innerHTML = `<thead><tr>
    <th>ФИО</th><th>Роль</th><th>Телефон</th><th>Статус</th><th style="width:200px"></th>
  </tr></thead>`;

  const tbody = document.createElement('tbody');

  executors.forEach(exec => {
    const tr = document.createElement('tr');

    // ФИО
    const tdName = document.createElement('td');
    tdName.dataset.label = 'ФИО';
    const nameDiv = document.createElement('div');
    nameDiv.className = 'executor-name';
    nameDiv.textContent = exec.full_name; // textContent — безопасно
    if (exec.is_admin) {
      const badge = document.createElement('span');
      badge.className = 'badge badge-success';
      badge.style.marginLeft = '6px';
      badge.textContent = '% продажа';
      nameDiv.appendChild(badge);
    }
    tdName.appendChild(nameDiv);

    // Роль
    const tdRole = document.createElement('td');
    tdRole.dataset.label = 'Роль';
    const roleSpan = document.createElement('span');
    roleSpan.className = 'executor-role';
    roleSpan.textContent = roleNames[exec.role] || exec.role;
    tdRole.appendChild(roleSpan);

    // Телефон
    const tdPhone = document.createElement('td');
    tdPhone.dataset.label = 'Телефон';
    const phoneSpan = document.createElement('span');
    phoneSpan.className = 'executor-phone';
    phoneSpan.textContent = exec.phone || '—';
    tdPhone.appendChild(phoneSpan);

    // Статус
    const tdStatus = document.createElement('td');
    tdStatus.dataset.label = 'Статус';
    const statusBadge = document.createElement('span');
    statusBadge.className = exec.is_active ? 'badge badge-success' : 'badge badge-inactive';
    statusBadge.textContent = exec.is_active ? 'Активен' : 'Неактивен';
    tdStatus.appendChild(statusBadge);

    // Действия
    const tdActions = document.createElement('td');
    tdActions.dataset.label = 'Действия';
    const actionsDiv = document.createElement('div');
    actionsDiv.className = 'row-actions';

    const editBtn = document.createElement('button');
    editBtn.className = 'btn btn-secondary btn-icon';
    editBtn.textContent = '✏️ Изменить';
    editBtn.dataset.action   = 'edit';
    editBtn.dataset.execId   = exec.id;

    const cardBtn = document.createElement('button');
    cardBtn.className = 'btn btn-secondary btn-icon';
    cardBtn.textContent = '👤 Карточка';
    cardBtn.dataset.action   = 'card';
    cardBtn.dataset.execId   = exec.id;

    const toggleBtn = document.createElement('button');
    toggleBtn.className  = exec.is_active ? 'btn btn-danger btn-icon' : 'btn btn-success btn-icon';
    toggleBtn.textContent = exec.is_active ? 'Деактивировать' : 'Активировать';
    toggleBtn.dataset.action   = exec.is_active ? 'deactivate' : 'activate';
    toggleBtn.dataset.execId   = exec.id;
    toggleBtn.dataset.execName = exec.full_name;

    actionsDiv.append(editBtn, cardBtn, toggleBtn);
    tdActions.appendChild(actionsDiv);

    tr.append(tdName, tdRole, tdPhone, tdStatus, tdActions);
    tbody.appendChild(tr);
  });

  tbl.appendChild(tbody);
  container.appendChild(tbl);
}

// ── Модал ─────────────────────────────────────────────────────────────
function openModal(title = 'Добавить сотрудника') {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('executorModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('executorModal').classList.remove('active');
  document.body.style.overflow = '';
  // сброс формы
  document.getElementById('executorId').value     = '';
  document.getElementById('executorName').value   = '';
  document.getElementById('executorRole').value   = '';
  document.getElementById('executorPhone').value  = '';
  document.getElementById('executorIsAdmin').checked = false;
  editingExecutorId = null;
}

async function editExecutor(executorId) {
  const { data, error } = await sb.from('executors').select('*').eq('id', executorId).single();
  if (error || !data) { console.error(error); return; }

  editingExecutorId = executorId;
  document.getElementById('executorId').value         = executorId;
  document.getElementById('executorName').value       = data.full_name;
  document.getElementById('executorRole').value       = data.role;
  document.getElementById('executorPhone').value      = data.phone || '';
  document.getElementById('executorIsAdmin').checked  = data.is_admin || false;
  openModal('Редактировать исполнителя');
}

async function toggleActive(executorId, name, activate) {
  const verb = activate ? `Активировать исполнителя «${name}»?` : `Деактивировать сотрудника «${name}»?\nОн не будет отображаться в активных, но история работ сохранится.`;
  const ok = await confirmAction({ message: verb });
  if (!ok) return;
  const { error } = await sb.from('executors').update({ is_active: activate }).eq('id', executorId);
  if (error) { console.error(error); return; }
  await loadExecutors();
}

async function saveExecutor() {
  const btn  = document.getElementById('btnSave');
  const name = document.getElementById('executorName').value.trim();
  const role = document.getElementById('executorRole').value;
  if (!name || !role) {
    document.getElementById(name ? 'executorRole' : 'executorName').focus();
    return;
  }

  const payload = {
    studio_id: studioId,
    full_name: name,
    role,
    phone:     document.getElementById('executorPhone').value.trim() || null,
    is_admin:  document.getElementById('executorIsAdmin').checked,
    is_active: true,
  };

  btn.disabled = true;
  const { error } = editingExecutorId
    ? await sb.from('executors').update(payload).eq('id', editingExecutorId)
    : await sb.from('executors').insert(payload);
  btn.disabled = false;

  if (error) { console.error(error); return; }
  closeModal();
  await loadExecutors();
}

// ── Events ────────────────────────────────────────────────────────────
function bindEvents() {
  document.getElementById('btnAddExecutor').addEventListener('click', () => openModal());
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('btnCancel').addEventListener('click', closeModal);
  document.getElementById('btnSave').addEventListener('click', saveExecutor);
  document.getElementById('showInactive').addEventListener('change', loadExecutors);
  document.getElementById('executorModal').addEventListener('click', e => {
    if (e.target.id === 'executorModal') closeModal();
  });

  // Delegation на таблице
  document.getElementById('executorsContainer').addEventListener('click', async e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const { action, execId, execName } = btn.dataset;
    if (action === 'edit')       await editExecutor(execId);
    if (action === 'card')       openExecutorCard(execId);
    if (action === 'deactivate') await toggleActive(execId, execName, false);
    if (action === 'activate')   await toggleActive(execId, execName, true);
  });
}

// ── Init ──────────────────────────────────────────────────────────────
async function initPage() {
  initNav({ actionLabel: '➕ Добавить сотрудника', actionHref: '#', hideAction: false });

  // Кнопка «Добавить» в top-bar nav
  const navAction = document.querySelector('#navTopBar .btn-nav-action');
  if (navAction) navAction.addEventListener('click', e => { e.preventDefault(); openModal(); });

  bindEvents();

  const user = await requireAuth({ redirectTo: 'welcome.html' });
  if (!user) return;
  currentUser = user;

  const ctx = await getStudioContext();
  if (!ctx?.studioId) {
    document.getElementById('executorsContainer').innerHTML = '<div class="empty-state">⚠️ Студия не найдена</div>';
    return;
  }
  studioId = ctx.studioId;

  await loadExecutors();
}

// ── Карточка сотрудника ───────────────────────────────────────────────
window.closeExecutorCard = function() {
  document.getElementById('execCardOverlay').style.display = 'none';
  document.getElementById('execCardDrawer').classList.remove('open');
  document.getElementById('execCardDrawer').style.display = 'none';
};

async function openExecutorCard(execId) {
  const exec = (await sb.from('executors').select('*').eq('id', execId).single()).data;
  if (!exec) return;

  const roleMap = { universal: 'Универсальный мастер', wrapper: 'Оклейщик', detailer: 'Детейлер', ppf: 'PPF-мастер', admin: 'Администратор' };

  document.getElementById('execCardName').textContent = exec.full_name;
  document.getElementById('execCardRole').textContent = roleMap[exec.role] || exec.role;
  document.getElementById('execCardBody').innerHTML = '<div style="color:#94a3b8;padding:24px 0;text-align:center">⏳ Загрузка...</div>';

  document.getElementById('execCardOverlay').style.display = 'block';
  const drawer = document.getElementById('execCardDrawer');
  drawer.style.display = 'flex';
  drawer.classList.add('open');

  // Параллельно грузим данные
  const [assignRes, eqRes] = await Promise.all([
    sb.from('work_assignments')
      .select('id, service_name, salary, status, payment_month, created_at, calculation_id')
      .eq('studio_id', studioId)
      .eq('executor_id', execId)
      .order('created_at', { ascending: false })
      .limit(50),
    sb.from('equipment_assignments')
      .select('id, issued_at, returned_at, purpose, equipment:equipment_id(name, category)')
      .eq('studio_id', studioId)
      .eq('executor_name', exec.full_name)
      .order('issued_at', { ascending: false })
  ]);

  const assignments = assignRes.data || [];
  const equipment   = eqRes.data || [];

  const paid    = assignments.filter(a => a.status === 'paid');
  const pending = assignments.filter(a => a.status !== 'paid');
  const totalPaid    = paid.reduce((s, a) => s + (a.salary || 0), 0);
  const totalPending = pending.reduce((s, a) => s + (a.salary || 0), 0);
  const totalEarned  = assignments.reduce((s, a) => s + (a.salary || 0), 0);

  const fmt = n => Number(n || 0).toLocaleString('ru-RU', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  const fmtDate = s => s ? new Date(s).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' }) : '—';

  const body = document.getElementById('execCardBody');
  body.innerHTML = '';

  // KPI
  const kpiSec = document.createElement('div');
  kpiSec.className = 'exec-section';
  kpiSec.innerHTML = `
    <div class="exec-kpi-grid">
      <div class="exec-kpi"><div class="exec-kpi-val">${assignments.length}</div><div class="exec-kpi-lbl">Работ</div></div>
      <div class="exec-kpi"><div class="exec-kpi-val" style="color:#059669">${fmt(totalPaid)} ₽</div><div class="exec-kpi-lbl">Выплачено</div></div>
      <div class="exec-kpi"><div class="exec-kpi-val" style="color:#b45309">${fmt(totalPending)} ₽</div><div class="exec-kpi-lbl">К выплате</div></div>
    </div>`;
  body.appendChild(kpiSec);

  // Взаиморасчёты
  const paySec = document.createElement('div');
  paySec.className = 'exec-section';
  const payTitle = document.createElement('div');
  payTitle.className = 'exec-section-title';
  payTitle.textContent = '💰 Взаиморасчёты';
  paySec.appendChild(payTitle);

  if (!assignments.length) {
    paySec.innerHTML += '<div class="exec-empty">Работ пока нет</div>';
  } else {
    // Группируем по месяцу
    const byMonth = {};
    assignments.forEach(a => {
      const m = a.payment_month || (a.created_at || '').slice(0, 7) || 'б/д';
      if (!byMonth[m]) byMonth[m] = { paid: 0, pending: 0, jobs: 0 };
      byMonth[m].jobs++;
      if (a.status === 'paid') byMonth[m].paid += (a.salary || 0);
      else byMonth[m].pending += (a.salary || 0);
    });

    Object.entries(byMonth).sort((a, b) => b[0].localeCompare(a[0])).forEach(([month, data]) => {
      const row = document.createElement('div');
      row.className = 'exec-assign-row';
      const dateStr = month.length === 7
        ? new Date(month + '-01').toLocaleDateString('ru-RU', { month: 'long', year: 'numeric' })
        : month;
      row.innerHTML = `
        <div>
          <div style="font-weight:600;color:#0f172a">${dateStr}</div>
          <div style="font-size:.72rem;color:#94a3b8">${data.jobs} работ</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          ${data.paid > 0 ? `<span class="exec-pill-paid">✓ ${fmt(data.paid)} ₽</span>` : ''}
          ${data.pending > 0 ? `<span class="exec-pill-pending">⏳ ${fmt(data.pending)} ₽</span>` : ''}
        </div>`;
      paySec.appendChild(row);
    });
  }
  body.appendChild(paySec);

  // Оборудование
  const eqSec = document.createElement('div');
  eqSec.className = 'exec-section';
  const eqTitle = document.createElement('div');
  eqTitle.className = 'exec-section-title';
  eqTitle.textContent = '🔧 Оборудование на руках';
  eqSec.appendChild(eqTitle);

  const activeEq = equipment.filter(a => !a.returned_at);
  const histEq   = equipment.filter(a =>  a.returned_at);

  if (!activeEq.length && !histEq.length) {
    eqSec.innerHTML += '<div class="exec-empty">Оборудование не выдавалось</div>';
  } else {
    if (activeEq.length) {
      activeEq.forEach(a => {
        const row = document.createElement('div');
        row.className = 'exec-eq-row';
        row.innerHTML = `
          <div>
            <div style="font-weight:600;color:#0f172a">${a.equipment?.name || '—'}</div>
            <div style="font-size:.72rem;color:#94a3b8">С ${fmtDate(a.issued_at)}${a.purpose ? ' · ' + a.purpose : ''}</div>
          </div>
          <span style="background:rgba(37,99,235,.1);color:#2563eb;font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:20px">На руках</span>`;
        eqSec.appendChild(row);
      });
    }
    if (histEq.length) {
      const histTitle = document.createElement('div');
      histTitle.style.cssText = 'font-size:.7rem;color:#94a3b8;font-weight:700;margin-top:10px;margin-bottom:4px';
      histTitle.textContent = 'Ранее выдавалось';
      eqSec.appendChild(histTitle);
      histEq.slice(0, 5).forEach(a => {
        const row = document.createElement('div');
        row.className = 'exec-eq-row';
        row.style.opacity = '.6';
        row.innerHTML = `
          <div style="font-weight:600;color:#0f172a">${a.equipment?.name || '—'}</div>
          <span style="font-size:.72rem;color:#94a3b8">${fmtDate(a.issued_at)} – ${fmtDate(a.returned_at)}</span>`;
        eqSec.appendChild(row);
      });
    }
  }
  body.appendChild(eqSec);

  // Контакт
  if (exec.phone || exec.email || exec.notes) {
    const infoSec = document.createElement('div');
    infoSec.className = 'exec-section';
    const infoTitle = document.createElement('div');
    infoTitle.className = 'exec-section-title';
    infoTitle.textContent = '📋 Информация';
    infoSec.appendChild(infoTitle);
    [['📞 Телефон', exec.phone], ['✉️ Email', exec.email], ['📝 Заметки', exec.notes]].filter(([, v]) => v).forEach(([l, v]) => {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;gap:10px;font-size:.82rem;padding:5px 0;color:#0f172a';
      row.innerHTML = `<span style="color:#94a3b8;width:90px;flex-shrink:0">${l}</span><span style="font-weight:600">${v}</span>`;
      infoSec.appendChild(row);
    });
    body.appendChild(infoSec);
  }
}

document.addEventListener('DOMContentLoaded', initPage);
</script>
</body>
</html>
