<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Клиенты — Keep1R CRM</title>
  <link rel="stylesheet" href="nav.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="mobile.css?v=1774508385">
  <style>
    body { background: #f5f7fa; }
    .page { padding: 24px; max-width: 1280px; margin: 0 auto; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .page-header h1 { font-size: 24px; font-weight: 700; margin: 0; }
    .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-primary:hover { background: var(--brand-dark); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-danger { background: #fee2e2; color: #ef4444; }
    .search-bar { display: flex; gap: 12px; margin-bottom: 20px; }
    .search-bar input { flex: 1; padding: 10px 14px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; outline: none; }
    .search-bar input:focus { border-color: var(--brand); }
    .clients-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(320px, 100%), 1fr)); gap: 16px; }
    .client-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.06); cursor: pointer; transition: box-shadow .15s; }
    .client-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.1); }
    .client-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .client-phone { font-size: 14px; color: #6b7280; margin-bottom: 8px; }
    .client-vehicles { display: flex; gap: 6px; flex-wrap: wrap; }
    .vehicle-tag { background: #eff6ff; color: var(--brand); font-size: 12px; padding: 3px 8px; border-radius: 20px; }
    .client-actions { display: flex; gap: 8px; margin-top: 12px; }
    .empty { text-align: center; padding: 60px 20px; color: #9ca3af; }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 16px; padding: 28px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
    .modal h2 { margin: 0 0 20px; font-size: 20px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .form-group label { font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; }
    .form-group input, .form-group textarea { padding: 10px 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; outline: none; }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--brand); }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .btn-secondary { background: #f3f4f6; color: #374151; }

    /* Vehicle section in modal */
    .vehicles-section { border-top: 1px solid #f3f4f6; margin-top: 16px; padding-top: 16px; }
    .vehicles-section h3 { font-size: 14px; font-weight: 600; margin: 0 0 12px; }
    .vehicle-row { display: grid; grid-template-columns: 1fr 1fr 80px; gap: 8px; margin-bottom: 8px; align-items: center; }
    .vehicle-row input { padding: 8px 10px; border: 1px solid #e5e7eb; border-radius: 6px; font-size: 13px; }
    .btn-icon { background: none; border: none; cursor: pointer; font-size: 18px; padding: 4px; }
    @media (max-width: 768px) {
      .page { padding: 14px 12px 32px; }
      .clients-grid { gap: 12px; }
      .client-card { margin-bottom: 0; border: 1px solid rgba(124,58,237,0.08); }
      .modal { max-width: 100% !important; width: 100% !important; border-radius: 20px 20px 0 0 !important; max-height: 85dvh !important; align-self: flex-end; }
      .modal-overlay.open { align-items: flex-end !important; }
      .form-row { grid-template-columns: 1fr !important; }
      .vehicle-row { grid-template-columns: 1fr 1fr 40px !important; }
    }
  </style>
</head>
<body>
<div class="page">
  <div class="page-header">
    <h1>👤 Клиенты</h1>
    <button class="btn btn-primary" onclick="openModal()">+ Добавить клиента</button>
  </div>
  <div class="search-bar">
    <input type="text" id="search" placeholder="🔍 Поиск по имени, телефону, авто..." oninput="filterClients()">
  </div>
  <div class="clients-grid" id="clients-grid">
    <div class="empty"><div class="empty-icon">👤</div><div>Загрузка...</div></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="modal-title">Новый клиент</h2>
    <div class="form-row">
      <div class="form-group"><label>Фамилия</label><input id="f-last" placeholder="Иванов"></div>
      <div class="form-group"><label>Имя</label><input id="f-first" placeholder="Иван"></div>
    </div>
    <div class="form-group"><label>Отчество</label><input id="f-middle" placeholder="Иванович"></div>
    <div class="form-row">
      <div class="form-group"><label>Телефон</label><input id="f-phone" placeholder="+7 999 000 00 00"></div>
      <div class="form-group"><label>Email</label><input id="f-email" placeholder="ivan@mail.ru"></div>
    </div>
    <div class="form-group"><label>Заметки</label><textarea id="f-notes" rows="2" placeholder="Любая доп. информация"></textarea></div>

    <div class="vehicles-section">
      <h3>🚗 Автомобили</h3>
      <div id="vehicles-list"></div>
      <button class="btn btn-secondary btn-sm" onclick="addVehicleRow()">+ Добавить авто</button>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" onclick="saveClient()">Сохранить</button>
    </div>
  </div>
</div>

<script src="nav.js?v=1774551573"></script>
<script type="module">
import { sb } from './api.js';
import { getStudioContext } from './studio-context.js';
import { escapeHtml } from './formatters.js';
import { showToast } from './ui.js';

let studioId = null;
let allClients = [];
let editingId = null;

async function init() {
  try {
    const ctx = await getStudioContext();
    if (!ctx) return;
    studioId = ctx.studioId;
    await loadClients();
  } catch (err) {
    console.error('[clients] init:', err);
    showToast('error', 'Не удалось загрузить данные');
  }
}

async function loadClients() {
  try {
    const { data: clients, error: e1 } = await sb.from('clients').eq('studio_id', studioId).order('created_at', { ascending: false });
    if (e1) throw e1;
    const { data: vehicles, error: e2 } = await sb.from('vehicles').eq('studio_id', studioId);
    if (e2) throw e2;

    allClients = (clients || []).map(c => ({
      ...c,
      vehicles: (vehicles || []).filter(v => v.client_id === c.id)
    }));
    renderClients(allClients);
  } catch (err) {
    console.error('[clients] loadClients:', err);
    showToast('error', 'Не удалось загрузить клиентов');
  }
}

function renderClients(list) {
  const grid = document.getElementById('clients-grid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">👤</div><div>Клиентов пока нет</div></div>';
    return;
  }
  grid.innerHTML = list.map(c => {
    const safeId = escapeHtml(String(c.id));
    const safeName = escapeHtml([c.last_name, c.first_name, c.middle_name].filter(Boolean).join(' ') || 'Без имени');
    const safePhone = escapeHtml(c.phone || '');
    const safeEmail = c.email ? '· ' + escapeHtml(c.email) : '';
    return `
    <div class="client-card" onclick="editClient('${safeId}')">
      <div class="client-name">${safeName}</div>
      <div class="client-phone">${safePhone} ${safeEmail}</div>
      <div class="client-vehicles">
        ${c.vehicles.map(v => `<span class="vehicle-tag">${escapeHtml(v.brand || '')} ${escapeHtml(v.model || '')} ${escapeHtml(String(v.year || ''))}</span>`).join('')}
      </div>
      <div class="client-actions">
        <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();editClient('${safeId}')">✏️ Редактировать</button>
        <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteClient('${safeId}')">🗑</button>
      </div>
    </div>`;
  }).join('');
}

window.filterClients = () => {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = allClients.filter(c => {
    const name = [c.last_name, c.first_name, c.middle_name].filter(Boolean).join(' ').toLowerCase();
    const phone = (c.phone || '').toLowerCase();
    const cars = c.vehicles.map(v => `${v.brand} ${v.model} ${v.plate} ${v.vin}`).join(' ').toLowerCase();
    return name.includes(q) || phone.includes(q) || cars.includes(q);
  });
  renderClients(filtered);
};

window.openModal = () => {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Новый клиент';
  ['f-last','f-first','f-middle','f-phone','f-email','f-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('vehicles-list').innerHTML = '';
  document.getElementById('modal').classList.add('open');
};

window.closeModal = () => document.getElementById('modal').classList.remove('open');

window.editClient = (id) => {
  const c = allClients.find(x => x.id === id);
  if (!c) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Редактировать клиента';
  document.getElementById('f-last').value = c.last_name || '';
  document.getElementById('f-first').value = c.first_name || '';
  document.getElementById('f-middle').value = c.middle_name || '';
  document.getElementById('f-phone').value = c.phone || '';
  document.getElementById('f-email').value = c.email || '';
  document.getElementById('f-notes').value = c.notes || '';
  const vList = document.getElementById('vehicles-list');
  vList.innerHTML = '';
  c.vehicles.forEach(v => addVehicleRow(v));
  document.getElementById('modal').classList.add('open');
};

window.addVehicleRow = (v = {}) => {
  const div = document.createElement('div');
  div.className = 'vehicle-row';
  div.innerHTML = `
    <input placeholder="Марка" value="${escapeHtml(v.brand||'')}" data-field="brand">
    <input placeholder="Модель" value="${escapeHtml(v.model||'')}" data-field="model">
    <input placeholder="Год" value="${escapeHtml(String(v.year||''))}" data-field="year" type="number">
    <input placeholder="Цвет" value="${escapeHtml(v.color||'')}" data-field="color" style="grid-column:1">
    <input placeholder="Гос. номер" value="${escapeHtml(v.plate||'')}" data-field="plate">
    <input placeholder="VIN" value="${escapeHtml(v.vin||'')}" data-field="vin" style="grid-column:1/3">
    <button class="btn-icon" onclick="this.closest('.vehicle-row').remove()">🗑</button>
  `;
  if (v.id) div.dataset.vehicleId = v.id;
  document.getElementById('vehicles-list').appendChild(div);
};

window.saveClient = async () => {
  try {
    const body = {
      studio_id:   studioId,
      last_name:   document.getElementById('f-last').value.trim(),
      first_name:  document.getElementById('f-first').value.trim(),
      middle_name: document.getElementById('f-middle').value.trim(),
      phone:       document.getElementById('f-phone').value.trim(),
      email:       document.getElementById('f-email').value.trim(),
      notes:       document.getElementById('f-notes').value.trim(),
      updated_at:  new Date().toISOString(),
    };

    let clientId = editingId;
    if (editingId) {
      const { error } = await sb.from('clients').update(body).eq('id', editingId);
      if (error) throw error;
    } else {
      const { data, error } = await sb.from('clients').insert(body);
      if (error) throw error;
      clientId = data?.id;
    }

    // Сохраняем авто
    const rows = document.querySelectorAll('#vehicles-list .vehicle-row');
    for (const row of rows) {
      const vData = {
        studio_id: studioId,
        client_id: clientId,
        brand:  row.querySelector('[data-field="brand"]').value.trim(),
        model:  row.querySelector('[data-field="model"]').value.trim(),
        year:   parseInt(row.querySelector('[data-field="year"]').value) || null,
        color:  row.querySelector('[data-field="color"]').value.trim(),
        plate:  row.querySelector('[data-field="plate"]').value.trim(),
        vin:    row.querySelector('[data-field="vin"]').value.trim(),
      };
      if (row.dataset.vehicleId) {
        const { error } = await sb.from('vehicles').update(vData).eq('id', row.dataset.vehicleId);
        if (error) throw error;
      } else {
        const { error } = await sb.from('vehicles').insert(vData);
        if (error) throw error;
      }
    }

    showToast('success', 'Сохранено');
    closeModal();
    await loadClients();
  } catch (err) {
    console.error('[clients] saveClient:', err);
    showToast('error', 'Не удалось сохранить клиента');
  }
};

window.deleteClient = async (id) => {
  if (!confirm('Удалить клиента и все его авто?')) return;
  try {
    const { error: e1 } = await sb.from('vehicles').delete().eq('client_id', id);
    if (e1) throw e1;
    const { error: e2 } = await sb.from('clients').delete().eq('id', id);
    if (e2) throw e2;
    showToast('success', 'Удалено');
    await loadClients();
  } catch (err) {
    console.error('[clients] deleteClient:', err);
    showToast('error', 'Не удалось удалить клиента');
  }
};

init();
</script>
</body>
</html>
