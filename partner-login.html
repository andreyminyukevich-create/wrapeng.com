<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — Keep1R Partner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; -webkit-font-smoothing: antialiased; background: linear-gradient(135deg, #2e1065 0%, #5b21b6 50%, #7c3aed 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-card { background: #fff; border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.login-logo { text-align: center; margin-bottom: 28px; }
.login-logo h1 { font-size: 1.6rem; font-weight: 800; color: #1e1b4b; }
.login-logo span { color: #7c3aed; }
.login-logo p { font-size: 0.82rem; color: #64748b; margin-top: 4px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; margin-bottom: 6px; }
.form-group input { width: 100%; padding: 12px 14px; border: 1.5px solid rgba(124,58,237,0.15); border-radius: 10px; font-size: 0.9rem; font-family: inherit; color: #1e1b4b; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
.form-group input:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
.btn-login { width: 100%; padding: 13px; border-radius: 10px; border: none; background: linear-gradient(135deg, #7c3aed, #a855f7); color: #fff; font-size: 0.9rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.15s; }
.btn-login:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(124,58,237,0.4); }
.btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.login-error { color: #ef4444; font-size: 0.82rem; font-weight: 600; text-align: center; margin-top: 12px; display: none; }
.login-footer { text-align: center; margin-top: 20px; font-size: 0.78rem; color: #94a3b8; }
.login-footer a { color: #7c3aed; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <h1>Keep1R <span>Partner</span></h1>
    <p>Кабинет покупателя плёнки</p>
  </div>
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="partner@studio.ru" autocomplete="email">
  </div>
  <div class="form-group">
    <label>Пароль</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn-login" id="btnLogin">Войти</button>
  <div class="login-error" id="loginError"></div>
  <div class="login-footer">
    <a href="welcome.html">← Войти в CRM</a>
  </div>
</div>

<script type="module">
import { partnerLogin, isAuthenticated } from './partner-api.js';

if (isAuthenticated()) window.location.href = 'partner-dashboard.html';

// Сохранить реферальный код
const ref = new URLSearchParams(location.search).get('ref');
if (ref) localStorage.setItem('k1r_referral', ref);

document.getElementById('btnLogin').addEventListener('click', login);
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';

  if (!email || !password) { errEl.textContent = 'Введите email и пароль'; errEl.style.display = 'block'; return; }

  const btn = document.getElementById('btnLogin');
  btn.disabled = true; btn.textContent = '⏳ Вход...';

  const { data, error } = await partnerLogin(email, password);
  btn.disabled = false; btn.textContent = 'Войти';

  if (error) { errEl.textContent = error; errEl.style.display = 'block'; return; }

  // Проверяем роль — партнёр или CRM
  if (data.user?.role === 'partner') {
    window.location.href = 'partner-dashboard.html';
  } else {
    window.location.href = 'dashboard.html';
  }
}
</script>
</body>
</html>
