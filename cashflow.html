<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ДДС — Keep1R CRM</title>
<link rel="stylesheet" href="nav.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="mobile.css?v=1774508385">
<style>
body { background: #f5f7fa; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; }
.container { max-width: 1280px; margin: 0 auto; padding: 24px; }
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.page-header h1 { font-size: 1.4rem; font-weight: 800; color: var(--text); }
.btn { padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.875rem; font-weight: 600; transition: all .15s; }
.btn-primary { background: var(--brand); color: #fff; }
.btn-primary:hover { background: var(--brand-dark); }
.btn-secondary { background: #f1f5f9; color: #374151; }
.btn-secondary:hover { background: #e2e8f0; }
.btn-danger { background: #fee2e2; color: #ef4444; }
.btn-sm { padding: 6px 12px; font-size: 0.78rem; }

/* Summary cards */
.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
.summary-card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.summary-label { font-size: 0.75rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
.summary-value { font-size: 1.4rem; font-weight: 800; color: var(--text); }
.summary-value.green { color: #059669; }
.summary-value.red { color: #ef4444; }
.summary-value.blue { color: var(--brand); }

/* Filters */
.filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.filters select, .filters input { padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.875rem; outline: none; background: #fff; }
.filters select:focus, .filters input:focus { border-color: var(--brand); }
.filter-tag { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: #eff6ff; color: var(--brand); border-radius: 20px; font-size: 0.78rem; font-weight: 600; cursor: pointer; }
.filter-tag:hover { background: #dbeafe; }

/* Table */
.table-wrap { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.06); overflow: hidden; }
.table-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #f1f5f9; }
.table-title { font-size: 0.95rem; font-weight: 700; color: var(--text); }
table { width: 100%; border-collapse: collapse; }
th { padding: 12px 16px; text-align: left; font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid #f1f5f9; background: #f8fafc; }
td { padding: 12px 16px; font-size: 0.875rem; color: #374151; border-bottom: 1px solid #f8fafc; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f8fafc; }
.amount-income { color: #059669; font-weight: 700; }
.amount-expense { color: #ef4444; font-weight: 700; }
.badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }
.badge-paid { background: #dcfce7; color: #166534; }
.badge-debt { background: #fee2e2; color: #991b1b; }
.badge-cash { background: #f0fdf4; color: #166534; }
.badge-bank { background: #eff6ff; color: var(--brand-dark); }
.badge-card { background: #fdf4ff; color: #7e22ce; }
.empty { text-align: center; padding: 60px 20px; color: #94a3b8; }
.empty-icon { font-size: 3rem; margin-bottom: 12px; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 16px; padding: 28px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
.modal h2 { font-size: 1.1rem; font-weight: 800; margin-bottom: 20px; }
.form-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
.form-group label { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; }
.form-group input, .form-group select, .form-group textarea { padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.875rem; outline: none; }
.form-group input:focus, .form-group select:focus { border-color: var(--brand); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.type-toggle { display: flex; gap: 0; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
.type-btn { flex: 1; padding: 10px; border: none; cursor: pointer; font-size: 0.875rem; font-weight: 600; background: #f8fafc; color: #64748b; transition: all .15s; }
.type-btn.active-income { background: #dcfce7; color: #166534; }
.type-btn.active-expense { background: #fee2e2; color: #991b1b; }

@media (max-width: 640px) {
  .container { padding: 14px 12px 32px; }
  .form-row { grid-template-columns: 1fr; }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { font-size: 0.8rem; min-width: 600px; }
  th, td { padding: 8px 10px; white-space: nowrap; }
}
</style>
</head>
<body>
<div class="container">
  <div class="page-header">
    <h1>💸 Движение денег (ДДС)</h1>
    <button class="btn btn-primary" onclick="openModal()">+ Операция</button>
  </div>

  <!-- Summary -->
  <div class="summary-grid" id="summaryGrid">
    <div class="summary-card"><div class="summary-label">Доходы за месяц</div><div class="summary-value green" id="sumIncome">—</div></div>
    <div class="summary-card"><div class="summary-label">Расходы за месяц</div><div class="summary-value red" id="sumExpense">—</div></div>
    <div class="summary-card"><div class="summary-label">Баланс месяца</div><div class="summary-value blue" id="sumBalance">—</div></div>
    <div class="summary-card"><div class="summary-label">Наличные</div><div class="summary-value" id="sumCash">—</div></div>
    <div class="summary-card"><div class="summary-label">БН (QR и счёт)</div><div class="summary-value" id="sumBank">—</div></div>
    <div class="summary-card"><div class="summary-label">Долги (нам)</div><div class="summary-value green" id="sumDebtIn">—</div></div>
    <div class="summary-card"><div class="summary-label">Долги (мы должны)</div><div class="summary-value red" id="sumDebtOut">—</div></div>
  </div>

  <!-- Type tabs -->
  <div style="display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch">
    <button class="filter-tab active" onclick="setFilterType(this,'')" style="padding:7px 14px;border-radius:8px;border:1px solid #e5e7eb;background:var(--brand,#7c3aed);color:#fff;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;flex-shrink:0">Все</button>
    <button class="filter-tab" onclick="setFilterType(this,'income')" style="padding:7px 14px;border-radius:8px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:#6b7280;white-space:nowrap;flex-shrink:0">Поступления</button>
    <button class="filter-tab" onclick="setFilterType(this,'expense')" style="padding:7px 14px;border-radius:8px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:#6b7280;white-space:nowrap;flex-shrink:0">Расходы</button>
  </div>

  <!-- Filters -->
  <div class="filters">
    <input type="hidden" id="filterType" value="">
    <select id="filterPayment" onchange="applyFilters()">
      <option value="">Все формы оплаты</option>
      <option value="cash">Наличные</option>
      <option value="bank">БН (QR и счёт)</option>
      <option value="card">Карта</option>
      <option value="acquiring">Эквайринг</option>
      <option value="transfer">Перевод</option>
    </select>
    <select id="filterStatus" onchange="applyFilters()">
      <option value="">Все статусы</option>
      <option value="paid">Оплачено</option>
      <option value="debt">Долг</option>
    </select>
    <input type="month" id="filterMonth" onchange="applyFilters()">
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="table-header">
      <span class="table-title">Операции</span>
      <span id="tableCount" style="font-size:.8rem;color:#64748b"></span>
    </div>
    <table>
      <thead>
        <tr>
          <th>Дата</th>
          <th>Тип</th>
          <th>Категория</th>
          <th>Сумма</th>
          <th>Форма оплаты</th>
          <th>Контрагент</th>
          <th>Статус</th>
          <th>Описание</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="cashflowTable">
        <tr><td colspan="9" class="empty"><div class="empty-icon">💸</div><div>Загрузка...</div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modalTitle">Новая операция</h2>
    <div class="type-toggle">
      <button class="type-btn active-income" id="btnIncome" onclick="setType('income')">➕ Доход</button>
      <button class="type-btn" id="btnExpense" onclick="setType('expense')">➖ Расход</button>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Сумма *</label>
        <input type="number" id="fAmount" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>Дата *</label>
        <input type="date" id="fDate">
      </div>
    </div>
    <div class="form-group">
      <label>Категория *</label>
      <select id="fCategory"></select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Форма оплаты *</label>
        <select id="fPayment">
          <option value="cash">💵 Наличные</option>
          <option value="bank">🏦 БН (QR и счёт)</option>
          <option value="card">💳 Карта</option>
          <option value="acquiring">📱 Эквайринг</option>
          <option value="transfer">📲 Перевод</option>
        </select>
      </div>
      <div class="form-group">
        <label>Статус</label>
        <select id="fStatus">
          <option value="paid">✅ Оплачено</option>
          <option value="debt">⏳ Долг</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Контрагент</label>
      <select id="fCounterparty">
        <option value="">— не выбран —</option>
      </select>
    </div>
    <div class="form-group">
      <label>Связать с заказом</label>
      <select id="fCalculation">
        <option value="">— не выбран —</option>
      </select>
    </div>
    <div class="form-group">
      <label>Описание</label>
      <textarea id="fDescription" rows="2" placeholder="Комментарий к операции"></textarea>
    </div>
    <div id="fDebtDateWrap" class="form-group" style="display:none">
      <label>Срок оплаты долга</label>
      <input type="date" id="fDueDate">
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" onclick="saveOperation()">Сохранить</button>
    </div>
  </div>
</div>

<script src="nav.js?v=1774551573"></script>
<script src="footer.js?v=1774512457"></script>
<script type="module">
import { sb } from './api.js';
import { requireAuth } from './auth.js';
import { getStudioContext } from './studio-context.js';
import { showToast } from './ui.js';
import { escapeHtml } from './formatters.js';

let studioId, allRows = [], categories = [], currentType = 'income', editId = null;

const fmt = n => new Intl.NumberFormat('ru-RU', {minimumFractionDigits: 0, maximumFractionDigits: 0}).format(n||0) + ' ₽';
const payLabels = {cash:'Наличные', bank:'БН (QR и счёт)', card:'Карта', acquiring:'Эквайринг', transfer:'Перевод'};
const payBadge  = {cash:'badge-cash', bank:'badge-bank', card:'badge-card', acquiring:'badge-card', transfer:'badge-bank'};

window.setFilterType = function(btn, type) {
  document.getElementById('filterType').value = type;
  document.querySelectorAll('.filter-tab').forEach(b => {
    b.style.background = b === btn ? 'var(--brand,#7c3aed)' : '#fff';
    b.style.color = b === btn ? '#fff' : '#6b7280';
    b.style.borderColor = b === btn ? 'var(--brand,#7c3aed)' : '#e5e7eb';
  });
  applyFilters();
};

window.setType = function(t) {
  currentType = t;
  document.getElementById('btnIncome').className  = 'type-btn' + (t==='income'  ? ' active-income'  : '');
  document.getElementById('btnExpense').className = 'type-btn' + (t==='expense' ? ' active-expense' : '');
  fillCategories();
};

window.openModal = function(id) {
  editId = id || null;
  document.getElementById('modalTitle').textContent = id ? 'Редактировать операцию' : 'Новая операция';
  if (!id) {
    currentType = 'income';
    setType('income');
    document.getElementById('fAmount').value = '';
    document.getElementById('fDate').value = new Date().toISOString().slice(0,10);
    document.getElementById('fDescription').value = '';
    document.getElementById('fStatus').value = 'paid';
    document.getElementById('fDueDate').value = '';
    document.getElementById('fDebtDateWrap').style.display = 'none';
  } else {
    const row = allRows.find(r => r.id === id);
    if (!row) return;
    currentType = row.type;
    setType(row.type);
    document.getElementById('fAmount').value = row.amount;
    document.getElementById('fDate').value = row.created_at?.slice(0,10) || '';
    document.getElementById('fDescription').value = row.description || '';
    document.getElementById('fPayment').value = row.payment_method || 'cash';
    document.getElementById('fStatus').value = row.debt_status || 'paid';
    document.getElementById('fCategory').value = row.category_id || '';
    document.getElementById('fCounterparty').value = row.counterparty_id || '';
    document.getElementById('fCalculation').value = row.calculation_id || '';
    document.getElementById('fDebtDateWrap').style.display = row.debt_status === 'debt' ? 'block' : 'none';
    document.getElementById('fDueDate').value = row.due_date || '';
  }
  document.getElementById('modal').classList.add('open');
};

window.closeModal = function() {
  document.getElementById('modal').classList.remove('open');
};

window.saveOperation = async function() {
  const amount = parseFloat(document.getElementById('fAmount').value);
  if (!amount || amount <= 0) { showToast('warning', 'Укажите сумму'); return; }
  const catId = document.getElementById('fCategory').value;
  if (!catId) { showToast('warning', 'Выберите категорию'); return; }

  const payload = {
    studio_id: studioId,
    type: currentType,
    category_id: catId,
    amount,
    payment_method: document.getElementById('fPayment').value,
    debt_status: document.getElementById('fStatus').value,
    description: document.getElementById('fDescription').value || null,
    counterparty_id: document.getElementById('fCounterparty').value || null,
    calculation_id: document.getElementById('fCalculation').value || null,
    due_date: document.getElementById('fDueDate').value || null,
    paid_at: document.getElementById('fStatus').value === 'paid' ? new Date().toISOString() : null,
    created_at: document.getElementById('fDate').value || new Date().toISOString().slice(0,10),
  };

  try {
    let err;
    if (editId) {
      ({ error: err } = await sb.from('cash_flow').update(payload).eq('id', editId));
    } else {
      ({ error: err } = await sb.from('cash_flow').insert(payload));
    }
    if (err) { showToast('error', 'Ошибка сохранения: ' + err.message); return; }
    closeModal();
    await loadData();
    showToast('success', editId ? 'Операция обновлена' : 'Операция добавлена');
  } catch (e) {
    console.error('[cashflow] saveOperation:', e);
    showToast('error', 'Не удалось сохранить операцию');
  }
};

window.deleteOp = async function(id) {
  if (!confirm('Удалить операцию?')) return;
  try {
    const { error } = await sb.from('cash_flow').delete().eq('id', id);
    if (error) { showToast('error', 'Ошибка удаления: ' + error.message); return; }
    await loadData();
    showToast('success', 'Удалено');
  } catch (e) {
    console.error('[cashflow] deleteOp:', e);
    showToast('error', 'Не удалось удалить операцию');
  }
};

window.applyFilters = function() { renderTable(); };

function fillCategories() {
  const sel = document.getElementById('fCategory');
  const filtered = categories.filter(c => c.type === currentType);
  sel.innerHTML = '<option value="">— выберите —</option>' +
    filtered.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
}

function renderTable() {
  const type    = document.getElementById('filterType').value;
  const payment = document.getElementById('filterPayment').value;
  const status  = document.getElementById('filterStatus').value;
  const month   = document.getElementById('filterMonth').value;

  let rows = allRows.filter(r => {
    if (type    && r.type !== type) return false;
    if (payment && r.payment_method !== payment) return false;
    if (status  && r.debt_status !== status) return false;
    if (month   && !r.created_at?.startsWith(month)) return false;
    return true;
  });

  document.getElementById('tableCount').textContent = `${rows.length} операций`;

  const tb = document.getElementById('cashflowTable');
  if (!rows.length) {
    tb.innerHTML = `<tr><td colspan="9" class="empty"><div class="empty-icon">💸</div><div>Нет операций</div></td></tr>`;
    return;
  }

  tb.innerHTML = rows.map(r => {
    const cat  = categories.find(c => c.id === r.category_id);
    const date = r.created_at?.slice(0,10) || '';
    const amtClass = r.type === 'income' ? 'amount-income' : 'amount-expense';
    const amtSign  = r.type === 'income' ? '+' : '−';
    const statusBadge = r.debt_status === 'debt'
      ? '<span class="badge badge-debt">Долг</span>'
      : '<span class="badge badge-paid">Оплачено</span>';
    const payBadgeClass = payBadge[r.payment_method] || 'badge-cash';
    return `<tr>
      <td>${date}</td>
      <td>${r.type === 'income' ? '➕ Доход' : '➖ Расход'}</td>
      <td>${escapeHtml(cat?.name || '—')}</td>
      <td class="${amtClass}">${amtSign}${fmt(r.amount)}</td>
      <td><span class="badge ${payBadgeClass}">${escapeHtml(payLabels[r.payment_method]||r.payment_method)}</span></td>
      <td>${escapeHtml(r.counterparty?.name || '—')}</td>
      <td>${statusBadge}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(r.description||'—')}</td>
      <td>
        <button class="btn btn-secondary btn-sm" onclick="openModal('${r.id}')">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deleteOp('${r.id}')">🗑</button>
      </td>
    </tr>`;
  }).join('');
}

function renderSummary() {
  const now = new Date();
  const month = now.toISOString().slice(0,7);
  const monthRows = allRows.filter(r => r.created_at?.startsWith(month));

  const income  = monthRows.filter(r=>r.type==='income').reduce((s,r)=>s+Number(r.amount),0);
  const expense = monthRows.filter(r=>r.type==='expense').reduce((s,r)=>s+Number(r.amount),0);
  const cash    = allRows.filter(r=>r.payment_method==='cash'&&r.debt_status==='paid').reduce((s,r)=>s+(r.type==='income'?1:-1)*Number(r.amount),0);
  const bank    = allRows.filter(r=>r.payment_method==='bank'&&r.debt_status==='paid').reduce((s,r)=>s+(r.type==='income'?1:-1)*Number(r.amount),0);
  const debtIn  = allRows.filter(r=>r.debt_status==='debt'&&r.type==='income').reduce((s,r)=>s+Number(r.amount),0);
  const debtOut = allRows.filter(r=>r.debt_status==='debt'&&r.type==='expense').reduce((s,r)=>s+Number(r.amount),0);

  document.getElementById('sumIncome').textContent  = fmt(income);
  document.getElementById('sumExpense').textContent = fmt(expense);
  const bal = income - expense;
  const balEl = document.getElementById('sumBalance');
  balEl.textContent = (bal>=0?'+':'') + fmt(bal);
  balEl.className = 'summary-value ' + (bal>=0?'green':'red');
  document.getElementById('sumCash').textContent    = fmt(cash);
  document.getElementById('sumBank').textContent    = fmt(bank);
  document.getElementById('sumDebtIn').textContent  = fmt(debtIn);
  document.getElementById('sumDebtOut').textContent = fmt(debtOut);
}

async function loadData() {
  try {
    const [cfRes, catRes, cpRes, calcRes] = await Promise.all([
      sb.from('cash_flow').select('*, counterparty:counterparties(name)').eq('studio_id', studioId).order('created_at', {ascending: false}),
      sb.from('cash_flow_categories').select('*').eq('studio_id', studioId).order('sort_order'),
      sb.from('counterparties').select('id, name').eq('studio_id', studioId).order('name'),
      sb.from('calculations').select('id, car_name').eq('studio_id', studioId).order('created_at', {ascending: false}).limit(50),
    ]);

    if (cfRes.error) { showToast('error', 'Ошибка загрузки операций'); console.error('[cashflow] loadData cfRes:', cfRes.error); }
    if (catRes.error) { showToast('error', 'Ошибка загрузки категорий'); console.error('[cashflow] loadData catRes:', catRes.error); }

    allRows    = cfRes.data  || [];
    categories = catRes.data || [];

    // Fill counterparties dropdown
    const cpSel = document.getElementById('fCounterparty');
    cpSel.innerHTML = '<option value="">— не выбран —</option>' +
      (cpRes.data||[]).map(c=>`<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');

    // Fill calculations dropdown
    const calcSel = document.getElementById('fCalculation');
    calcSel.innerHTML = '<option value="">— не выбран —</option>' +
      (calcRes.data||[]).map(c=>`<option value="${c.id}">${escapeHtml(c.car_name||'Без названия')}</option>`).join('');

    fillCategories();
    renderSummary();
    renderTable();
  } catch (e) {
    console.error('[cashflow] loadData:', e);
    showToast('error', 'Не удалось загрузить данные');
  }
}

// Показывать/скрывать поле срока долга
document.getElementById('fStatus').addEventListener('change', e => {
  document.getElementById('fDebtDateWrap').style.display = e.target.value === 'debt' ? 'block' : 'none';
});

// Init
(async () => {
  initNav();
  const user = await requireAuth({ redirectTo: 'welcome.html' });
  if (!user) return;
  const ctx = await getStudioContext();
  if (!ctx?.studioId) { window.location.href = 'welcome.html'; return; }
  studioId = ctx.studioId;

  // Set default month filter
  document.getElementById('filterMonth').value = new Date().toISOString().slice(0,7);

  await loadData();
})();
</script>
